name: Build APK

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      # Generates real gradlew / gradlew.bat / gradle/wrapper/gradle-wrapper.jar
      # / gradle-wrapper.properties using the official Gradle distribution
      # fetched by setup-gradle above. This is the authentic wrapper, not a
      # hand-written stand-in. DO NOT remove this step — without it, the
      # gradlew file below does not exist and every later step fails.
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p apk-output
          cp app/build/outputs/apk/debug/*.apk apk-output/ChuBaichuan-TagAI-debug.apk
          cp app/build/outputs/apk/release/*.apk apk-output/ChuBaichuan-TagAI-release.apk

      - name: Verify fixed release signature
        run: |
          EXPECTED_SHA256_RAW="DF:6B:9A:AE:02:74:DE:0F:DC:5C:7C:03:32:39:1B:15:2E:6F:FB:92:4E:52:D6:C9:B0:61:C7:77:A3:41:39:3F"
          EXPECTED_SHA256=$(printf '%s' "$EXPECTED_SHA256_RAW" | tr '[:upper:]' '[:lower:]' | tr -d ':')
          APKSIGNER="$(find "${ANDROID_HOME}/build-tools" -name apksigner | sort -V | tail -n 1)"
          "$APKSIGNER" verify --print-certs apk-output/ChuBaichuan-TagAI-release.apk | tee apk-output/signature.txt
          ACTUAL_SHA256_RAW=$(grep -m 1 "SHA-256 digest" apk-output/signature.txt | sed 's/.*: //')
          ACTUAL_SHA256=$(printf '%s' "$ACTUAL_SHA256_RAW" | tr '[:upper:]' '[:lower:]' | tr -d ':')
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "Release APK signature mismatch"
            echo "Expected: $EXPECTED_SHA256_RAW"
            echo "Actual:   $ACTUAL_SHA256_RAW"
            exit 1
          fi
          echo "Release APK signature verified: $ACTUAL_SHA256_RAW"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChuBaichuan-TagAI-apk
          path: apk-output/*.apk
          if-no-files-found: error

      - name: Extract app version
        if: github.event_name != 'pull_request'
        run: |
          APP_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Prepare version release APK
        if: github.event_name != 'pull_request'
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          else
            RELEASE_TAG="v${APP_VERSION}"
            RELEASE_VERSION="${APP_VERSION}"
          fi
          cp apk-output/ChuBaichuan-TagAI-release.apk "apk-output/ChuBaichuan-TagAI-v${RELEASE_VERSION}.apk"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_APK=apk-output/ChuBaichuan-TagAI-v${RELEASE_VERSION}.apk" >> "$GITHUB_ENV"

      - name: Create or update Release and upload APK
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ChuBaichuan TagAI v${{ env.RELEASE_VERSION }}
          body: |
            正式版 v${{ env.RELEASE_VERSION }}

            - 标签：${{ env.RELEASE_TAG }}
            - 提交：${{ github.sha }}
            - 运行编号：${{ github.run_number }}

            下载 `ChuBaichuan-TagAI-v${{ env.RELEASE_VERSION }}.apk` 即可安装。
          files: |
            ${{ env.RELEASE_APK }}
          fail_on_unmatched_files: true
          overwrite_files: true
